name: Frontend - Build & Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      product_api_url:
        description: "Product API base URL (e.g., http://X.X.X.X:8000)"
        required: true
      order_api_url:
        description: "Order API base URL (e.g., http://Y.Y.Y.Y:8001)"
        required: true
      namespace:
        description: "Kubernetes namespace"
        required: false
        default: "dev"

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject backend IPs in frontend/main.js
        run: |
          sed -i "s|_PRODUCT_API_URL_|${{ inputs.product_api_url }}|g" frontend/main.js
          sed -i "s|_ORDER_API_URL_|${{ inputs.order_api_url }}|g" frontend/main.js
          echo "----- main.js preview -----"
          head -n 25 frontend/main.js

      - name: Login to ACR (admin)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/frontend:latest

      - name: Write kubeconfig
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > $HOME/kubeconfig
          echo "KUBECONFIG=$HOME/kubeconfig" >> $GITHUB_ENV

      - name: Apply frontend manifest
        run: |
          NS=${{ inputs.namespace }}
          kubectl --kubeconfig "$HOME/kubeconfig" get ns $NS || kubectl --kubeconfig "$HOME/kubeconfig" create ns $NS
          kubectl --kubeconfig "$HOME/kubeconfig" -n $NS apply -f week08/k8s/frontend.yaml
          kubectl --kubeconfig "$HOME/kubeconfig" -n $NS set image deployment/frontend frontend-container=${{ env.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}
          kubectl --kubeconfig "$HOME/kubeconfig" -n $NS rollout status deployment/frontend --timeout=180s

      - name: Show frontend service
        run: kubectl --kubeconfig "$HOME/kubeconfig" -n ${{ inputs.namespace }} get svc -o wide
