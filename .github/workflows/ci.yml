name: CI — Test, Build & Push (week08)

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }} # e.g. belieliu27w08acr.azurecr.io
  IMAGE_PRODUCT: product_service
  IMAGE_ORDER: order_service

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      product: ${{ steps.filter.outputs.product }}
      order: ${{ steps.filter.outputs.order }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            product:
              - "backend/product_service/**"
              - "k8s/product-*.yaml"
            order:
              - "backend/order_service/**"
              - "k8s/order-*.yaml"
            frontend:
              - "frontend/**"
              - "k8s/frontend.yaml"

  product-tests:
    name: Unit tests (product)
    needs: detect-changes
    if: needs.detect-changes.outputs.product == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: |
          pip install -r backend/product_service/requirements-dev.txt
      - name: Run pytest
        run: |
          pytest -q backend/product_service/tests

  order-tests:
    name: Unit tests (order)
    needs: detect-changes
    if: needs.detect-changes.outputs.order == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: |
          pip install -r backend/order_service/requirements-dev.txt
      - name: Run pytest
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: orders
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
        run: |
          pytest -q backend/order_service/tests

  build_push_product:
    name: Build & push product_service
    needs: [detect-changes, product-tests]
    if: needs.detect-changes.outputs.product == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set SHORT_SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push product_service
        uses: docker/build-push-action@v6
        with:
          context: ./backend/product_service
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PRODUCT }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PRODUCT }}:${{ env.SHORT_SHA }}

  build_push_order:
    name: Build & push order_service
    needs: [detect-changes, order-tests]
    if: needs.detect-changes.outputs.order == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set SHORT_SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push order_service
        uses: docker/build-push-action@v6
        with:
          context: ./backend/order_service
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_ORDER }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_ORDER }}:${{ env.SHORT_SHA }}
